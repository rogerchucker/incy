# HTTP shim in front of Redis so Incy's outbound webhook can enqueue tasks and agents
# can claim them. Stdlib-only (minimal RESP client) — no pip install, no image build.
#   POST /enqueue  <- webhook target: LPUSH the delivery onto the queue (optional HMAC verify)
#   POST /claim    -> agent pulls the next task: RPOP (FIFO)
#   GET  /tasks    -> inspect queue depth + pending tasks
apiVersion: v1
kind: ConfigMap
metadata:
  name: incy-taskq-src
  namespace: incy
data:
  taskq.py: |
    import json, os, socket, hashlib, hmac
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    REDIS_HOST = os.environ.get("REDIS_HOST", "incy-redis")
    REDIS_PORT = int(os.environ.get("REDIS_PORT", "6379"))
    QUEUE = os.environ.get("QUEUE_KEY", "incy:tasks")
    SECRET = os.environ.get("WEBHOOK_SECRET", "")

    def _read_reply(f):
        t = f.read(1)
        if not t:
            raise RuntimeError("no reply")
        line = f.readline().rstrip(b"\r\n")
        if t == b"+":
            return line.decode()
        if t == b"-":
            raise RuntimeError(line.decode())
        if t == b":":
            return int(line)
        if t == b"$":
            n = int(line)
            if n == -1:
                return None
            data = f.read(n); f.read(2); return data
        if t == b"*":
            n = int(line)
            if n == -1:
                return None
            return [_read_reply(f) for _ in range(n)]
        raise RuntimeError("bad reply type %r" % t)

    def redis_cmd(*args):
        s = socket.create_connection((REDIS_HOST, REDIS_PORT), timeout=5)
        try:
            buf = b"*%d\r\n" % len(args)
            for a in args:
                b = a if isinstance(a, (bytes, bytearray)) else str(a).encode()
                buf += b"$%d\r\n" % len(b) + b + b"\r\n"
            s.sendall(buf)
            return _read_reply(s.makefile("rb"))
        finally:
            s.close()

    class H(BaseHTTPRequestHandler):
        def _send(self, code, obj):
            body = json.dumps(obj).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_POST(self):
            n = int(self.headers.get("Content-Length", 0) or 0)
            body = self.rfile.read(n)
            path = self.path.rstrip("/")
            if path == "/enqueue":
                sig = self.headers.get("X-Incy-Signature-256", "")
                verified = None
                if SECRET:
                    expected = "sha256=" + hmac.new(SECRET.encode(), body, hashlib.sha256).hexdigest()
                    verified = hmac.compare_digest(expected, sig)
                    if not verified:
                        print("[enqueue] REJECTED: bad signature", flush=True)
                        return self._send(401, {"error": "bad signature"})
                depth = redis_cmd("LPUSH", QUEUE, body)
                try:
                    ev = json.loads(body); inc = ev.get("data", {}).get("incident", {})
                    print(f"[enqueue] {ev.get('event_type')} #{inc.get('incident_number')} "
                          f"sev={inc.get('severity')} -> queue depth={depth} verified={verified}", flush=True)
                except Exception:
                    print(f"[enqueue] queued raw, depth={depth}", flush=True)
                return self._send(200, {"queued": True, "depth": depth, "verified": verified})
            if path == "/claim":
                raw = redis_cmd("RPOP", QUEUE)
                if raw is None:
                    return self._send(200, {"task": None})
                task = json.loads(raw)
                inc = task.get("data", {}).get("incident", {})
                print(f"[claim] delivered incident #{inc.get('incident_number')} to an agent", flush=True)
                return self._send(200, {"task": task})
            return self._send(404, {"error": "not found"})

        def do_GET(self):
            path = self.path.rstrip("/")
            if path in ("/tasks", ""):
                depth = redis_cmd("LLEN", QUEUE)
                items = redis_cmd("LRANGE", QUEUE, 0, -1) or []
                tasks = []
                for it in items:
                    try:
                        tasks.append(json.loads(it))
                    except Exception:
                        pass
                return self._send(200, {"depth": depth, "tasks": tasks})
            if path == "/healthz":
                return self._send(200, {"ok": True})
            return self._send(404, {"error": "not found"})

        def log_message(self, *a):
            pass

    port = int(os.environ.get("PORT", "8080"))
    print(f"taskq listening on :{port} redis={REDIS_HOST}:{REDIS_PORT} "
          f"queue={QUEUE} verify={'on' if SECRET else 'off'}", flush=True)
    ThreadingHTTPServer(("0.0.0.0", port), H).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: incy-taskq
  namespace: incy
  labels: { app: incy-taskq }
spec:
  replicas: 1
  selector:
    matchLabels: { app: incy-taskq }
  template:
    metadata:
      labels: { app: incy-taskq }
    spec:
      containers:
        - name: taskq
          image: python:3.13-slim
          command: ["python", "/app/taskq.py"]
          env:
            - name: REDIS_HOST
              value: "incy-redis"
            - name: PORT
              value: "8080"
            - name: WEBHOOK_SECRET
              value: ""   # patched after the subscription is created (enables HMAC verify)
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: src
              mountPath: /app
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { memory: 128Mi }
      volumes:
        - name: src
          configMap:
            name: incy-taskq-src
---
apiVersion: v1
kind: Service
metadata:
  name: incy-taskq
  namespace: incy
spec:
  selector: { app: incy-taskq }
  ports:
    - port: 8080
      targetPort: 8080
