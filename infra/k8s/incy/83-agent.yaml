# Autonomous remediation agent: polls the task queue, claims an incident, and writes
# its status back to Incy (claimed -> in_progress -> completed) via the new
# POST /v1/incidents/{id}/agent endpoint. Stdlib-only.
apiVersion: v1
kind: ConfigMap
metadata:
  name: incy-agent-src
  namespace: incy
data:
  agent.py: |
    import json, os, time, socket, urllib.request, urllib.error

    TASKQ = os.environ.get("TASKQ_URL", "http://incy-taskq:8080")
    INCY = os.environ.get("INCY_API", "http://incy-api:8000")
    AGENT_ID = os.environ.get("AGENT_ID") or socket.gethostname()
    AGENT_NAME = os.environ.get("AGENT_NAME", "remediation-agent")
    POLL = float(os.environ.get("POLL_INTERVAL", "3"))
    USER = "20000000-0000-0000-0000-000000000001"

    def _post(url, obj):
        data = json.dumps(obj).encode()
        req = urllib.request.Request(
            url, data=data, method="POST",
            headers={"Content-Type": "application/json", "X-User-Id": USER},
        )
        with urllib.request.urlopen(req, timeout=10) as r:
            return json.loads(r.read() or b"{}")

    def claim():
        req = urllib.request.Request(TASKQ + "/claim", data=b"", method="POST")
        with urllib.request.urlopen(req, timeout=10) as r:
            return json.loads(r.read() or b"{}").get("task")

    def report(incident_id, status, detail):
        try:
            _post(f"{INCY}/v1/incidents/{incident_id}/agent",
                  {"agent_id": AGENT_ID, "agent_name": AGENT_NAME, "status": status, "detail": detail})
            print(f"  -> reported '{status}' for incident {incident_id}", flush=True)
        except urllib.error.HTTPError as e:
            print(f"  !! report '{status}' failed: HTTP {e.code} {e.read()[:200]}", flush=True)
        except Exception as e:
            print(f"  !! report '{status}' failed: {e}", flush=True)

    print(f"agent '{AGENT_NAME}' (id={AGENT_ID}) consuming {TASKQ}, reporting to {INCY}", flush=True)
    while True:
        try:
            task = claim()
        except Exception as e:
            print(f"claim error: {e}", flush=True); time.sleep(POLL); continue
        if not task:
            time.sleep(POLL); continue
        inc = task.get("data", {}).get("incident", {})
        iid = inc.get("id")
        if not iid:
            continue
        print(f"[picked up] incident #{inc.get('incident_number')} "
              f"sev={inc.get('severity')} :: {inc.get('title')}", flush=True)
        report(iid, "claimed", f"Picked up off the queue by {AGENT_NAME}")
        time.sleep(2)
        report(iid, "in_progress", "Diagnosing: scaling payment-api, checking DB connection pool")
        time.sleep(3)
        report(iid, "completed", "Mitigated: rolled back the bad deploy; checkout recovered")
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: incy-agent
  namespace: incy
  labels: { app: incy-agent }
spec:
  replicas: 1
  selector:
    matchLabels: { app: incy-agent }
  template:
    metadata:
      labels: { app: incy-agent }
    spec:
      containers:
        - name: agent
          image: python:3.13-slim
          command: ["python", "/app/agent.py"]
          env:
            - name: TASKQ_URL
              value: "http://incy-taskq:8080"
            - name: INCY_API
              value: "http://incy-api:8000"
            - name: AGENT_NAME
              value: "remediation-agent-01"
          volumeMounts:
            - name: src
              mountPath: /app
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { memory: 128Mi }
      volumes:
        - name: src
          configMap:
            name: incy-agent-src
