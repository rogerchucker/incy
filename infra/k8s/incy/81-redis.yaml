# Redis broker backing the incident task queue. Ephemeral (demo): queue state is
# transient, which is fine — tasks are consumed immediately by the agent.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: incy-redis
  namespace: incy
  labels: { app: incy-redis }
spec:
  replicas: 1
  selector:
    matchLabels: { app: incy-redis }
  template:
    metadata:
      labels: { app: incy-redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: incy-redis
  namespace: incy
spec:
  selector: { app: incy-redis }
  ports:
    - port: 6379
      targetPort: 6379
