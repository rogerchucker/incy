apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: incy-postgres-data
  namespace: incy
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: do-block-storage
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: incy-postgres
  namespace: incy
  labels: { app: incy-postgres }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: incy-postgres }
  template:
    metadata:
      labels: { app: incy-postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef: { name: incy-db }
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U incy -d incy"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 512Mi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: incy-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: incy-postgres
  namespace: incy
spec:
  selector: { app: incy-postgres }
  ports:
    - port: 5432
      targetPort: 5432
