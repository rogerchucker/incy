apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: demo-sre
  labels:
    app: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7
        ports:
        - containerPort: 27017
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: demo-sre
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
